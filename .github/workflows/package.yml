name: Package Tomviz Installers

on:
  # Rebuild on push to master when packaging code changes
  push:
    branches:
      - main
      - master
    paths:
      - 'packaging/**'
      - '.github/workflows/package.yml'

  # Poll for new conda-forge releases every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual triggers
  workflow_dispatch:
    inputs:
      tomviz_version:
        description: 'Tomviz version to package (leave empty for latest)'
        required: false
      python_version:
        description: 'Python version'
        required: false
        default: '3.13'
      force:
        description: 'Force rebuild even if version already released'
        type: boolean
        default: false

env:
  PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.13' }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      tomviz_version: ${{ steps.check.outputs.tomviz_version }}
      build_string: ${{ steps.check.outputs.build_string }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version or build
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event.inputs.tomviz_version }}
          INPUT_FORCE: ${{ github.event.inputs.force || (github.event_name == 'push' && 'true') }}
          PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          # Get the latest tomviz version and build string from conda-forge
          read VERSION BUILD_STRING < <(python3 -c "
          import urllib.request, json
          url = 'https://conda.anaconda.org/conda-forge/linux-64/repodata.json'
          data = json.loads(urllib.request.urlopen(url).read())
          packages = []
          for name, info in {**data.get('packages', {}), **data.get('packages.conda', {})}.items():
              if info.get('name') == 'tomviz':
                  packages.append(info)
          py_prefix = 'py' + '${PYTHON_VERSION}'.replace('.', '')
          matching = [p for p in packages if p['build'].startswith(py_prefix)]
          if not matching:
              matching = packages
          def ver_key(p):
              parts = tuple(int(x) for x in p['version'].split('.') if x.isdigit())
              return (parts, p['build_number'])
          latest = sorted(matching, key=ver_key)[-1]
          print(latest['version'], latest['build'])
          ")

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          fi

          echo "Latest conda-forge: $VERSION ($BUILD_STRING)"
          echo "tomviz_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_string=$BUILD_STRING" >> "$GITHUB_OUTPUT"

          if [ "$INPUT_FORCE" = "true" ]; then
            echo "Force rebuild requested."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if we already have a release for this version
          EXISTING_NOTES=$(gh release view "v$VERSION" --json body --jq '.body' 2>/dev/null || echo "")
          if [ -z "$EXISTING_NOTES" ]; then
            echo "No existing release for v$VERSION — will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif echo "$EXISTING_NOTES" | grep -q "build: $BUILD_STRING"; then
            echo "Release v$VERSION already matches build $BUILD_STRING — skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release v$VERSION exists but build changed to $BUILD_STRING — rebuilding."
            # Delete the old release so we can recreate it
            gh release delete "v$VERSION" --repo "${{ github.repository }}" -y || true
            git push --delete origin "v$VERSION" 2>/dev/null || true
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-macos-x64:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-15-intel  # x64 runner
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: tomviz-package
          conda-remove-defaults: 'true'

      - name: Install packaging tools
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge conda-pack cmake

      - name: Build package
        shell: bash -el {0}
        env:
          TOMVIZ_VERSION: ${{ needs.check-version.outputs.tomviz_version }}
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          python package.py --tomviz-version "$TOMVIZ_VERSION" --python-version "$TOMVIZ_PYTHON_VERSION"
          cpack --config CPackConfig.cmake

      - name: Verify package (structural)
        shell: bash -el {0}
        env:
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          APP_DIR=$(find _build/install -name "*.app" -type d | head -1)
          python verify.py "$APP_DIR" --python-version "$TOMVIZ_PYTHON_VERSION"

      - name: Verify package (smoke test via launcher)
        run: |
          APP_DIR=$(find packaging/_build/install -name "*.app" -type d | head -1)
          "$APP_DIR/Contents/MacOS/tomviz" &
          PID=$!
          sleep 10

          if kill -0 "$PID" 2>/dev/null; then
            echo "OK: tomviz process $PID is running after 10s"
            kill "$PID" || true
            wait "$PID" 2>/dev/null || true
          else
            wait "$PID" 2>/dev/null
            EXIT_CODE=$?
            echo "FAIL: tomviz exited early with code $EXIT_CODE"
            exit 1
          fi

      - name: Check artifact size
        run: |
          DMG=$(ls packaging/Tomviz-*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "FAIL: No DMG found"
            exit 1
          fi
          SIZE_MB=$(du -m "$DMG" | cut -f1)
          echo "DMG size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -lt 100 ]; then
            echo "FAIL: DMG too small (${SIZE_MB} MB)"
            exit 1
          fi
          echo "OK: DMG size is reasonable"

      - name: Rename artifact
        run: |
          mv packaging/Tomviz-*.dmg "packaging/Tomviz-${{ needs.check-version.outputs.tomviz_version }}-x86_64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: Tomviz-${{ needs.check-version.outputs.tomviz_version }}-x86_64.dmg
          path: packaging/Tomviz-*-x86_64.dmg

  build-macos-arm64:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-14  # arm64 runner
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: tomviz-package
          conda-remove-defaults: 'true'

      - name: Install packaging tools
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge conda-pack cmake

      - name: Build package
        shell: bash -el {0}
        env:
          TOMVIZ_VERSION: ${{ needs.check-version.outputs.tomviz_version }}
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          python package.py --tomviz-version "$TOMVIZ_VERSION" --python-version "$TOMVIZ_PYTHON_VERSION"
          cpack --config CPackConfig.cmake

      - name: Verify package (structural)
        shell: bash -el {0}
        env:
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          APP_DIR=$(find _build/install -name "*.app" -type d | head -1)
          python verify.py "$APP_DIR" --python-version "$TOMVIZ_PYTHON_VERSION"

      - name: Verify package (smoke test via launcher)
        run: |
          APP_DIR=$(find packaging/_build/install -name "*.app" -type d | head -1)
          "$APP_DIR/Contents/MacOS/tomviz" &
          PID=$!
          sleep 10

          if kill -0 "$PID" 2>/dev/null; then
            echo "OK: tomviz process $PID is running after 10s"
            kill "$PID" || true
            wait "$PID" 2>/dev/null || true
          else
            wait "$PID" 2>/dev/null
            EXIT_CODE=$?
            echo "FAIL: tomviz exited early with code $EXIT_CODE"
            exit 1
          fi

      - name: Check artifact size
        run: |
          DMG=$(ls packaging/Tomviz-*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "FAIL: No DMG found"
            exit 1
          fi
          SIZE_MB=$(du -m "$DMG" | cut -f1)
          echo "DMG size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -lt 100 ]; then
            echo "FAIL: DMG too small (${SIZE_MB} MB)"
            exit 1
          fi
          echo "OK: DMG size is reasonable"

      - name: Rename artifact
        run: |
          mv packaging/Tomviz-*.dmg "packaging/Tomviz-${{ needs.check-version.outputs.tomviz_version }}-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: Tomviz-${{ needs.check-version.outputs.tomviz_version }}-arm64.dmg
          path: packaging/Tomviz-*-arm64.dmg

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: tomviz-package
          conda-remove-defaults: 'true'

      - name: Install packaging tools
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge conda-pack cmake

      - name: Build package
        shell: bash -el {0}
        env:
          TOMVIZ_VERSION: ${{ needs.check-version.outputs.tomviz_version }}
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          python package.py --tomviz-version "$TOMVIZ_VERSION" --python-version "$TOMVIZ_PYTHON_VERSION"
          cpack --config CPackConfig.cmake -G ZIP
          cpack --config CPackConfig.cmake -G WIX || {
            echo "=== WIX log ==="
            cat _CPack_Packages/WIX/wix.log 2>/dev/null || echo "wix.log not found"
            exit 1
          }

      - name: Verify package (structural)
        shell: bash -el {0}
        env:
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          python verify.py _build/install/tomviz --python-version "$TOMVIZ_PYTHON_VERSION"

      - name: Verify DLL dependencies
        shell: bash
        run: |
          ENV_DIR="packaging/_build/install/tomviz/env"
          TOMVIZ_EXE="$ENV_DIR/Library/bin/tomviz.exe"
          SEARCH_DIRS="$ENV_DIR/Library/bin;$ENV_DIR"

          echo "=== Checking DLL dependencies for tomviz.exe ==="
          # Use dumpbin to list dependencies
          DEPS=$(dumpbin //DEPENDENTS "$TOMVIZ_EXE" 2>/dev/null | grep -E "\.dll$" | tr -d ' ' || true)
          MISSING=0
          for dll in $DEPS; do
            # Skip Windows system DLLs
            if echo "$dll" | grep -iqE "^(KERNEL32|USER32|ADVAPI32|SHELL32|ole32|OLEAUT32|GDI32|COMCTL32|WS2_32|CRYPT32|WINSPOOL|COMDLG32|IMM32|WINMM|ntdll|SETUPAPI|WTSAPI32|NETAPI32|USERENV|dbghelp|PSAPI|VERSION|SHLWAPI|MSVCRT|MSVCP|VCRUNTIME|api-ms-|ext-ms-)"; then
              continue
            fi
            # Search for the DLL in the environment
            FOUND=0
            IFS=';' read -ra DIRS <<< "$SEARCH_DIRS"
            for dir in "${DIRS[@]}"; do
              if [ -f "$dir/$dll" ]; then
                FOUND=1
                break
              fi
            done
            if [ "$FOUND" -eq 0 ]; then
              echo "MISSING: $dll"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "FAIL: $MISSING DLLs not found in environment"
            exit 1
          fi
          echo "OK: All non-system DLL dependencies found"

      - name: Verify Python imports
        shell: bash
        run: |
          ENV_DIR="packaging/_build/install/tomviz/env"
          echo "=== Testing Python imports ==="
          "$ENV_DIR/python.exe" -c "
          import tomviz
          print('  OK: import tomviz')
          import tomviz.cli
          print('  OK: import tomviz.cli')
          try:
              import tomviz._wrapping
              print('  OK: import tomviz._wrapping')
          except ImportError as e:
              print(f'  WARN: import tomviz._wrapping failed: {e}')
          try:
              import tomviz._realtime.ctvlib
              print('  OK: import tomviz._realtime.ctvlib')
          except ImportError as e:
              print(f'  WARN: import tomviz._realtime.ctvlib failed: {e}')
          print('Python imports OK')
          "

      - name: Verify Qt plugins
        shell: bash
        run: |
          ENV_DIR="packaging/_build/install/tomviz/env"
          echo "=== Checking Qt plugins ==="
          # Qt plugins can be in different locations depending on the conda layout
          for PLUGIN_DIR in "$ENV_DIR/Library/plugins" "$ENV_DIR/Library/lib/qt6/plugins"; do
            if [ -d "$PLUGIN_DIR/platforms" ]; then
              echo "OK: Qt platforms plugin dir exists at $PLUGIN_DIR/platforms"
              ls "$PLUGIN_DIR/platforms/"
              exit 0
            fi
          done
          echo "FAIL: Qt platforms plugin dir not found"
          exit 1

      - name: Verify MSI
        shell: bash
        run: |
          MSI=$(ls packaging/Tomviz-*.msi 2>/dev/null | head -1)
          if [ -z "$MSI" ]; then
            echo "FAIL: No MSI found"
            exit 1
          fi
          echo "=== Validating MSI: $MSI ==="
          # Check it's a valid OLE compound file (MSI magic bytes)
          MAGIC=$(xxd -l 8 "$MSI" | head -1)
          if echo "$MAGIC" | grep -q "d0cf 11e0"; then
            echo "OK: Valid MSI file (OLE compound document)"
          else
            echo "FAIL: Not a valid MSI file"
            exit 1
          fi
          # Query MSI properties using PowerShell
          powershell.exe -Command "
            \$db = (New-Object -ComObject WindowsInstaller.Installer).OpenDatabase('$(cygpath -w "$MSI")', 0)
            \$view = \$db.OpenView(\"SELECT Property, Value FROM Property WHERE Property='ProductName' OR Property='ProductVersion' OR Property='Manufacturer'\")
            \$view.Execute()
            while (\$record = \$view.Fetch()) {
              Write-Host \"  \$(\$record.StringData(1)): \$(\$record.StringData(2))\"
            }
          "
          echo "OK: MSI properties verified"

      - name: Check artifact sizes
        shell: bash
        run: |
          for ext in zip msi; do
            FILE=$(ls packaging/Tomviz-*.$ext 2>/dev/null | head -1)
            if [ -z "$FILE" ]; then
              echo "FAIL: No .$ext found"
              exit 1
            fi
            SIZE_MB=$(du -m "$FILE" | cut -f1)
            echo "$ext size: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "FAIL: $ext too small (${SIZE_MB} MB)"
              exit 1
            fi
            echo "OK: $ext size is reasonable"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: Tomviz-${{ needs.check-version.outputs.tomviz_version }}.zip
          path: packaging/Tomviz-*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Tomviz-${{ needs.check-version.outputs.tomviz_version }}.msi
          path: packaging/Tomviz-*.msi

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: tomviz-package
          conda-remove-defaults: 'true'

      - name: Install packaging tools
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge conda-pack cmake

      - name: Build package
        shell: bash -el {0}
        env:
          TOMVIZ_VERSION: ${{ needs.check-version.outputs.tomviz_version }}
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          python package.py --tomviz-version "$TOMVIZ_VERSION" --python-version "$TOMVIZ_PYTHON_VERSION"
          cpack --config CPackConfig.cmake

      - name: Verify package (structural)
        shell: bash -el {0}
        env:
          TOMVIZ_PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd packaging
          python verify.py _build/install/tomviz --python-version "$TOMVIZ_PYTHON_VERSION"

      - name: Verify Python imports
        run: |
          ENV_DIR="packaging/_build/install/tomviz/env"
          echo "=== Testing Python imports ==="
          "$ENV_DIR/bin/python" -c "
          import tomviz
          print('  OK: import tomviz')
          import tomviz.cli
          print('  OK: import tomviz.cli')
          try:
              import tomviz._wrapping
              print('  OK: import tomviz._wrapping')
          except ImportError as e:
              print(f'  WARN: import tomviz._wrapping failed: {e}')
          try:
              import tomviz._realtime.ctvlib
              print('  OK: import tomviz._realtime.ctvlib')
          except ImportError as e:
              print(f'  WARN: import tomviz._realtime.ctvlib failed: {e}')
          print('Python imports OK')
          "

      - name: Check artifact size
        run: |
          TGZ=$(ls packaging/Tomviz-*.tar.gz 2>/dev/null | head -1)
          if [ -z "$TGZ" ]; then
            echo "FAIL: No tar.gz found"
            exit 1
          fi
          SIZE_MB=$(du -m "$TGZ" | cut -f1)
          echo "tar.gz size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -lt 100 ]; then
            echo "FAIL: tar.gz too small (${SIZE_MB} MB)"
            exit 1
          fi
          echo "OK: tar.gz size is reasonable"

      - uses: actions/upload-artifact@v4
        with:
          name: Tomviz-${{ needs.check-version.outputs.tomviz_version }}.tar.gz
          path: packaging/Tomviz-*.tar.gz

  create-release:
    needs: [check-version, build-macos-x64, build-macos-arm64, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          # Files are already named correctly from each build job
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.msi" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create release on this repo
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.tomviz_version }}
          BUILD_STRING: ${{ needs.check-version.outputs.build_string }}
        run: |
          # Delete existing release if present
          gh release delete "v${VERSION}" --repo "${{ github.repository }}" -y 2>/dev/null || true
          git push --delete origin "v${VERSION}" 2>/dev/null || true

          gh release create "v${VERSION}" release/* \
            --repo "${{ github.repository }}" \
            --title "Tomviz ${VERSION}" \
            --notes "Standalone installers for Tomviz ${VERSION}.

          **macOS DMGs are unsigned.** Download and sign/notarize internally before distribution.

          Built from conda-forge packages with Python ${{ env.PYTHON_VERSION }}.
          conda-forge build: ${BUILD_STRING}"

      # Optionally also create a release on OpenChemistry/tomviz
      # Requires a PAT with contents:write on that repo, stored as TOMVIZ_RELEASE_TOKEN
      - name: Create release on OpenChemistry/tomviz
        if: vars.PUBLISH_TO_TOMVIZ_REPO == 'true'
        env:
          GH_TOKEN: ${{ secrets.TOMVIZ_RELEASE_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.tomviz_version }}
          BUILD_STRING: ${{ needs.check-version.outputs.build_string }}
        run: |
          gh release create "v${VERSION}" release/* \
            --repo "OpenChemistry/tomviz" \
            --title "Tomviz ${VERSION}" \
            --notes "Standalone installers for Tomviz ${VERSION}.

          Built from conda-forge packages with Python ${{ env.PYTHON_VERSION }}.
          conda-forge build: ${BUILD_STRING}" \
            || echo "Release may already exist on OpenChemistry/tomviz, skipping."
